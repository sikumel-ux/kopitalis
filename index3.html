<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOPITALIS</title>
    
    <meta name="theme-color" content="#1a1a16">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="kopi.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* No scrolling */
            /* Warna background disesuaikan dengan warna gelap di gambar */
            background-color: #1A1714; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        img {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="kopi.png" alt="KOPITALIS Logo">
    </div>

    <script>
        // Registrasi Service Worker untuk PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
