<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOPITALIS</title>
    
    <meta name="theme-color" content="#1a1a16">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="kopi.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* No scrolling */
            
            /* Penambahan Background Image */
            background-color: #1D1A16;
            background-size: cover; /* Gambar menutupi seluruh layar */
            background-position: center; /* Gambar tetap di tengah */
            background-repeat: no-repeat;
            background-color: #1A1714; /* Fallback warna jika gambar gagal dimuat */

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* Efek opsional: sedikit gelap di belakang logo agar logo lebih kontras */
            background-color: rgba(0, 0, 0, 0.2); 
        }

        img {
            max-width: 80%; /* Sedikit diperkecil agar tidak terlalu mepet ke tepi */
            max-height: 80vh;
            object-fit: contain;
            display: block;
            /* Tambahan drop shadow agar logo lebih "timbul" di atas background */
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="kopi.png" alt="KOPITALIS Logo">
    </div>

    <script>
        // Registrasi Service Worker untuk PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
